<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Lucide React Icons (inline SVG components)
        const Clock = ({ className, ...props }) => (
            <svg className={className} {...props} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
        );

        const Users = ({ className, ...props }) => (
            <svg className={className} {...props} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
        );

        const LogIn = ({ className, ...props }) => (
            <svg className={className} {...props} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                <polyline points="10 17 15 12 10 7"></polyline>
                <line x1="15" y1="12" x2="3" y2="12"></line>
            </svg>
        );

        const LogOut = ({ className, ...props }) => (
            <svg className={className} {...props} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
        );

        const Shield = ({ className, ...props }) => (
            <svg className={className} {...props} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
        );

        const ChevronDown = ({ className, ...props }) => (
            <svg className={className} {...props} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        );

        const ChevronUp = ({ className, ...props }) => (
            <svg className={className} {...props} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="18 15 12 9 6 15"></polyline>
            </svg>
        );

        const Download = ({ className, ...props }) => (
            <svg className={className} {...props} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
        );

        const AttendanceTracker = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [userRole, setUserRole] = useState(null);
            const [personnel, setPersonnel] = useState({});
            const [events, setEvents] = useState({});
            const [sessions, setSessions] = useState([]);
            const [pendingApprovals, setPendingApprovals] = useState([]);
            const [selectedEvent, setSelectedEvent] = useState('');
            const [showLogin, setShowLogin] = useState(true);
            const [expandedSections, setExpandedSections] = useState({});
            
            const [loginId, setLoginId] = useState('');
            const [loginPin, setLoginPin] = useState('');
            const [loginError, setLoginError] = useState('');

            const [newEventCode, setNewEventCode] = useState('');
            const [newEventName, setNewEventName] = useState('');
            const [newPersonnelId, setNewPersonnelId] = useState('');
            const [newPersonnelName, setNewPersonnelName] = useState('');
            const [newPersonnelPin, setNewPersonnelPin] = useState('');
            const [newPersonnelRole, setNewPersonnelRole] = useState('personnel');

            useEffect(() => {
                loadData();
            }, []);

            useEffect(() => {
                saveData();
            }, [personnel, events, sessions, pendingApprovals]);

            const loadData = () => {
                try {
                    const personnelData = localStorage.getItem('attendance-personnel');
                    const eventsData = localStorage.getItem('attendance-events');
                    const sessionsData = localStorage.getItem('attendance-sessions');
                    const pendingData = localStorage.getItem('attendance-pending');

                    let personnelToSet = {};
                    
                    if (personnelData) {
                        try {
                            const parsed = JSON.parse(personnelData);
                            if (Object.keys(parsed).length > 0) {
                                personnelToSet = parsed;
                            } else {
                                personnelToSet = {
                                    'admin': {
                                        id: 'admin',
                                        name: 'Administrator',
                                        pin: '1234',
                                        role: 'admin'
                                    }
                                };
                            }
                        } catch (e) {
                            personnelToSet = {
                                'admin': {
                                    id: 'admin',
                                    name: 'Administrator',
                                    pin: '1234',
                                    role: 'admin'
                                }
                            };
                        }
                    } else {
                        personnelToSet = {
                            'admin': {
                                id: 'admin',
                                name: 'Administrator',
                                pin: '1234',
                                role: 'admin'
                            }
                        };
                    }
                    
                    setPersonnel(personnelToSet);

                    if (eventsData) setEvents(JSON.parse(eventsData));
                    if (sessionsData) setSessions(JSON.parse(sessionsData));
                    if (pendingData) setPendingApprovals(JSON.parse(pendingData));
                } catch (error) {
                    console.error('Error loading data:', error);
                    setPersonnel({
                        'admin': {
                            id: 'admin',
                            name: 'Administrator',
                            pin: '1234',
                            role: 'admin'
                        }
                    });
                }
            };

            const createDefaultAdmin = () => {
                const defaultAdmin = {
                    'admin': {
                        id: 'admin',
                        name: 'Administrator',
                        pin: '1234',
                        role: 'admin'
                    }
                };
                setPersonnel(defaultAdmin);
            };

            const saveData = () => {
                try {
                    localStorage.setItem('attendance-personnel', JSON.stringify(personnel));
                    localStorage.setItem('attendance-events', JSON.stringify(events));
                    localStorage.setItem('attendance-sessions', JSON.stringify(sessions));
                    localStorage.setItem('attendance-pending', JSON.stringify(pendingApprovals));
                } catch (error) {
                    console.error('Error saving data:', error);
                }
            };

            const handleLogin = () => {
                const user = personnel[loginId];
                if (!user) {
                    setLoginError('Personnel ID not found');
                    return;
                }
                if (user.pin !== loginPin) {
                    setLoginError('Incorrect PIN');
                    return;
                }
                setCurrentUser(user);
                setUserRole(user.role);
                setShowLogin(false);
                setLoginError('');
                setLoginId('');
                setLoginPin('');
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setUserRole(null);
                setShowLogin(true);
                setSelectedEvent('');
            };

            const handleSignIn = () => {
                if (!selectedEvent) {
                    alert('Please select an event code');
                    return;
                }

                const hasPendingSignIn = pendingApprovals.some(
                    p => p.personnelId === currentUser.id && 
                    p.eventCode === selectedEvent && 
                    p.type === 'sign-in' &&
                    p.status === 'pending'
                );

                if (hasPendingSignIn) {
                    alert('You already have a pending sign-in request for this event. Please wait for admin approval.');
                    return;
                }

                const hasActiveSession = sessions.some(
                    s => s.personnelId === currentUser.id && 
                    s.eventCode === selectedEvent && 
                    !s.signOutTime
                );

                if (hasActiveSession) {
                    alert('You are already signed in to this event.');
                    return;
                }

                const pendingRequest = {
                    id: Date.now().toString(),
                    type: 'sign-in',
                    personnelId: currentUser.id,
                    personnelName: currentUser.name,
                    eventCode: selectedEvent,
                    requestTime: new Date().toISOString(),
                    status: 'pending'
                };

                setPendingApprovals([...pendingApprovals, pendingRequest]);
                alert('Sign-in request submitted. Please wait for administrator approval.');
            };

            const handleSignOut = () => {
                const activeSession = sessions.find(
                    s => s.personnelId === currentUser.id && 
                    s.eventCode === selectedEvent && 
                    !s.signOutTime
                );

                if (!activeSession) {
                    alert('No active session found for this event');
                    return;
                }

                const hasPendingSignOut = pendingApprovals.some(
                    p => p.sessionId === activeSession.id && 
                    p.type === 'sign-out' &&
                    p.status === 'pending'
                );

                if (hasPendingSignOut) {
                    alert('You already have a pending sign-out request. Please wait for admin approval.');
                    return;
                }

                const pendingRequest = {
                    id: Date.now().toString(),
                    type: 'sign-out',
                    sessionId: activeSession.id,
                    personnelId: currentUser.id,
                    personnelName: currentUser.name,
                    eventCode: selectedEvent,
                    requestTime: new Date().toISOString(),
                    status: 'pending'
                };

                setPendingApprovals([...pendingApprovals, pendingRequest]);
                alert('Sign-out request submitted. Please wait for administrator approval.');
            };

            const approveRequest = (requestId) => {
                const request = pendingApprovals.find(p => p.id === requestId);
                if (!request) return;

                if (request.type === 'sign-in') {
                    const newSession = {
                        id: Date.now().toString(),
                        personnelId: request.personnelId,
                        personnelName: request.personnelName,
                        eventCode: request.eventCode,
                        signInTime: request.requestTime,
                        signOutTime: null,
                        approvedBy: currentUser.name,
                        approvedAt: new Date().toISOString()
                    };
                    setSessions([...sessions, newSession]);
                } else if (request.type === 'sign-out') {
                    const updatedSessions = sessions.map(s =>
                        s.id === request.sessionId
                            ? { 
                                ...s, 
                                signOutTime: request.requestTime,
                                signOutApprovedBy: currentUser.name,
                                signOutApprovedAt: new Date().toISOString()
                            }
                            : s
                    );
                    setSessions(updatedSessions);
                }

                const updatedPending = pendingApprovals.map(p =>
                    p.id === requestId
                        ? { ...p, status: 'approved', approvedBy: currentUser.name, approvedAt: new Date().toISOString() }
                        : p
                );
                setPendingApprovals(updatedPending);
            };

            const denyRequest = (requestId) => {
                const updatedPending = pendingApprovals.map(p =>
                    p.id === requestId
                        ? { ...p, status: 'denied', deniedBy: currentUser.name, deniedAt: new Date().toISOString() }
                        : p
                );
                setPendingApprovals(updatedPending);
            };

            const addEvent = () => {
                if (!newEventCode || !newEventName) {
                    alert('Please enter both event code and name');
                    return;
                }
                setEvents({
                    ...events,
                    [newEventCode]: { code: newEventCode, name: newEventName }
                });
                setNewEventCode('');
                setNewEventName('');
            };

            const addPersonnel = () => {
                if (!newPersonnelId || !newPersonnelName || !newPersonnelPin) {
                    alert('Please fill in all fields');
                    return;
                }
                if (personnel[newPersonnelId]) {
                    alert('Personnel ID already exists');
                    return;
                }
                setPersonnel({
                    ...personnel,
                    [newPersonnelId]: {
                        id: newPersonnelId,
                        name: newPersonnelName,
                        pin: newPersonnelPin,
                        role: newPersonnelRole
                    }
                });
                setNewPersonnelId('');
                setNewPersonnelName('');
                setNewPersonnelPin('');
                setNewPersonnelRole('personnel');
            };

            const calculateDuration = (signIn, signOut) => {
                if (!signOut) return 'Active';
                const diff = new Date(signOut) - new Date(signIn);
                const hours = Math.floor(diff / 3600000);
                const minutes = Math.floor((diff % 3600000) / 60000);
                return `${hours}h ${minutes}m`;
            };

            const getTodaysSessions = (personnelId) => {
                const today = new Date().toDateString();
                return sessions.filter(s => 
                    s.personnelId === personnelId && 
                    new Date(s.signInTime).toDateString() === today
                );
            };

            const calculateTodayTotal = (personnelId) => {
                const todaySessions = getTodaysSessions(personnelId);
                let totalMinutes = 0;
                
                todaySessions.forEach(session => {
                    if (session.signOutTime) {
                        const diff = new Date(session.signOutTime) - new Date(session.signInTime);
                        totalMinutes += diff / 60000;
                    }
                });

                const hours = Math.floor(totalMinutes / 60);
                const minutes = Math.floor(totalMinutes % 60);
                return `${hours}h ${minutes}m`;
            };

            const calculateTotalMinutes = (sessions) => {
                let totalMinutes = 0;
                sessions.forEach(session => {
                    if (session.signOutTime) {
                        const diff = new Date(session.signOutTime) - new Date(session.signInTime);
                        totalMinutes += diff / 60000;
                    }
                });
                return totalMinutes;
            };

            const formatTimeWithPay = (totalMinutes) => {
                const hours = Math.floor(totalMinutes / 60);
                const minutes = Math.floor(totalMinutes % 60);
                const pay = (totalMinutes / 60) * 25;
                return {
                    time: `${hours}h ${minutes}m`,
                    hours: (totalMinutes / 60).toFixed(2),
                    pay: pay.toFixed(2)
                };
            };

            const calculatePersonnelEventTotals = (personnelId) => {
                const personnelSessions = sessions.filter(s => s.personnelId === personnelId && s.signOutTime);
                const eventTotals = {};
                let grandTotal = 0;

                personnelSessions.forEach(session => {
                    const minutes = (new Date(session.signOutTime) - new Date(session.signInTime)) / 60000;
                    if (!eventTotals[session.eventCode]) {
                        eventTotals[session.eventCode] = 0;
                    }
                    eventTotals[session.eventCode] += minutes;
                    grandTotal += minutes;
                });

                return { eventTotals, grandTotal };
            };

            const calculateEventTotals = (eventCode) => {
                const eventSessions = sessions.filter(s => s.eventCode === eventCode && s.signOutTime);
                const personnelTotals = {};
                let eventGrandTotal = 0;

                eventSessions.forEach(session => {
                    const minutes = (new Date(session.signOutTime) - new Date(session.signInTime)) / 60000;
                    if (!personnelTotals[session.personnelId]) {
                        personnelTotals[session.personnelId] = {
                            name: session.personnelName,
                            minutes: 0
                        };
                    }
                    personnelTotals[session.personnelId].minutes += minutes;
                    eventGrandTotal += minutes;
                });

                return { personnelTotals, eventGrandTotal };
            };

            const getSessionsByEvent = () => {
                const grouped = {};
                sessions.forEach(session => {
                    if (!grouped[session.eventCode]) {
                        grouped[session.eventCode] = [];
                    }
                    grouped[session.eventCode].push(session);
                });
                return grouped;
            };

            const exportReport = () => {
                const csvContent = [
                    ['Personnel ID', 'Personnel Name', 'Event Code', 'Sign In', 'Sign Out', 'Duration', 'Hours', 'Pay ($25/hr)'].join(','),
                    ...sessions.map(s => {
                        const minutes = s.signOutTime 
                            ? (new Date(s.signOutTime) - new Date(s.signInTime)) / 60000
                            : 0;
                        const formatted = formatTimeWithPay(minutes);
                        return [
                            s.personnelId,
                            s.personnelName,
                            s.eventCode,
                            new Date(s.signInTime).toLocaleString(),
                            s.signOutTime ? new Date(s.signOutTime).toLocaleString() : 'Active',
                            calculateDuration(s.signInTime, s.signOutTime),
                            s.signOutTime ? formatted.hours : '0',
                            s.signOutTime ? formatted.pay : '0.00'
                        ].join(',');
                    })
                ].join('\n');

                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `attendance-report-${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
            };

            const toggleSection = (section) => {
                setExpandedSections(prev => ({
                    ...prev,
                    [section]: !prev[section]
                }));
            };

            const isSignedIn = () => {
                if (!selectedEvent) return false;
                return sessions.some(
                    s => s.personnelId === currentUser.id && 
                    s.eventCode === selectedEvent && 
                    !s.signOutTime
                );
            };

            const hasPendingSignIn = () => {
                if (!selectedEvent) return false;
                return pendingApprovals.some(
                    p => p.personnelId === currentUser.id && 
                    p.eventCode === selectedEvent && 
                    p.type === 'sign-in' &&
                    p.status === 'pending'
                );
            };

            const hasPendingSignOut = () => {
                if (!selectedEvent) return false;
                const activeSession = sessions.find(
                    s => s.personnelId === currentUser.id && 
                    s.eventCode === selectedEvent && 
                    !s.signOutTime
                );
                if (!activeSession) return false;
                return pendingApprovals.some(
                    p => p.sessionId === activeSession.id && 
                    p.type === 'sign-out' &&
                    p.status === 'pending'
                );
            };

            const getPendingCount = () => {
                return pendingApprovals.filter(p => p.status === 'pending').length;
            };

            if (showLogin) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
                        <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
                            <div className="flex justify-center mb-6">
                                <div className="bg-indigo-600 rounded-full p-4">
                                    <Users className="w-12 h-12 text-white" />
                                </div>
                            </div>
                            <h1 className="text-3xl font-bold text-center text-gray-800 mb-2">
                                Attendance Tracker
                            </h1>
                            <p className="text-center text-gray-600 mb-8">Sign in to continue</p>
                            
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        Personnel ID
                                    </label>
                                    <input
                                        type="text"
                                        value={loginId}
                                        onChange={(e) => setLoginId(e.target.value)}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                                        placeholder="Enter your ID"
                                        onKeyPress={(e) => e.key === 'Enter' && handleLogin()}
                                    />
                                </div>
                                
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        PIN
                                    </label>
                                    <input
                                        type="password"
                                        value={loginPin}
                                        onChange={(e) => setLoginPin(e.target.value)}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                                        placeholder="Enter your PIN"
                                        onKeyPress={(e) => e.key === 'Enter' && handleLogin()}
                                    />
                                </div>

                                {loginError && (
                                    <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
                                        {loginError}
                                    </div>
                                )}

                                <button
                                    onClick={handleLogin}
                                    className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition duration-200 flex items-center justify-center gap-2"
                                >
                                    <LogIn className="w-5 h-5" />
                                    Sign In
                                </button>
                            </div>

                            <div className="mt-6 p-4 bg-gray-50 rounded-lg text-sm text-gray-600">
                                <p className="font-semibold mb-2">Default Credentials:</p>
                                <p>Admin ID: <span className="font-mono font-semibold">admin</span></p>
                                <p>Admin PIN: <span className="font-mono font-semibold">1234</span></p>
                                
                                <button
                                    onClick={() => {
                                        createDefaultAdmin();
                                        alert('Admin account reset to default credentials');
                                    }}
                                    className="mt-3 w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 px-4 rounded-lg transition duration-200"
                                >
                                    Reset to Default Admin
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50">
                    <div className="bg-white shadow-sm border-b">
                        <div className="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center">
                                <div className="flex items-center gap-3">
                                    <div className="bg-indigo-600 rounded-lg p-2">
                                        <Clock className="w-6 h-6 text-white" />
                                    </div>
                                    <div>
                                        <h1 className="text-2xl font-bold text-gray-900">Attendance Tracker</h1>
                                        <p className="text-sm text-gray-600">
                                            Welcome, {currentUser.name} 
                                            {userRole === 'admin' && (
                                                <>
                                                    <span className="ml-2 text-indigo-600 font-semibold">• Administrator</span>
                                                    {getPendingCount() > 0 && (
                                                        <span className="ml-2 bg-yellow-400 text-yellow-900 px-2 py-1 rounded-full text-xs font-bold animate-pulse">
                                                            {getPendingCount()} Pending
                                                        </span>
                                                    )}
                                                </>
                                            )}
                                        </p>
                                    </div>
                                </div>
                                <button
                                    onClick={handleLogout}
                                    className="flex items-center gap-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition duration-200"
                                >
                                    <LogOut className="w-4 h-4" />
                                    Logout
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
                        {userRole === 'personnel' && (
                            <div className="space-y-6">
                                {(() => {
                                    const myPending = pendingApprovals.filter(
                                        p => p.personnelId === currentUser.id && p.status === 'pending'
                                    );
                                    if (myPending.length > 0) {
                                        return (
                                            <div className="bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-lg">
                                                <div className="flex items-start">
                                                    <Clock className="w-5 h-5 text-yellow-600 mt-0.5 mr-3" />
                                                    <div>
                                                        <h3 className="text-sm font-semibold text-yellow-800">
                                                            Pending Approval Required
                                                        </h3>
                                                        <p className="text-sm text-yellow-700 mt-1">
                                                            You have {myPending.length} request{myPending.length > 1 ? 's' : ''} awaiting administrator approval.
                                                        </p>
                                                        <div className="mt-2 space-y-1">
                                                            {myPending.map(req => (
                                                                <p key={req.id} className="text-xs text-yellow-600">
                                                                    • {req.type === 'sign-in' ? 'Sign-in' : 'Sign-out'} for {events[req.eventCode]?.name || req.eventCode}
                                                                </p>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    }
                                    return null;
                                })()}

                                <div className="bg-white rounded-xl shadow-sm p-6">
                                    <h2 className="text-xl font-bold text-gray-900 mb-4">Time Tracking</h2>
                                    
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-2">
                                                Select Event Code
                                            </label>
                                            <select
                                                value={selectedEvent}
                                                onChange={(e) => setSelectedEvent(e.target.value)}
                                                className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                            >
                                                <option value="">Choose an event...</option>
                                                {Object.values(events).map(event => (
                                                    <option key={event.code} value={event.code}>
                                                        {event.code} - {event.name}
                                                    </option>
                                                ))}
                                            </select>
                                        </div>

                                        <div className="flex gap-3">
                                            <button
                                                onClick={handleSignIn}
                                                disabled={!selectedEvent || isSignedIn() || hasPendingSignIn()}
                                                className="flex-1 bg-green-600 hover:bg-green-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-lg transition duration-200 flex items-center justify-center gap-2"
                                            >
                                                <LogIn className="w-5 h-5" />
                                                {hasPendingSignIn() ? 'Pending Approval...' : 'Sign In'}
                                            </button>
                                            <button
                                                onClick={handleSignOut}
                                                disabled={!selectedEvent || !isSignedIn() || hasPendingSignOut()}
                                                className="flex-1 bg-red-600 hover:bg-red-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-lg transition duration-200 flex items-center justify-center gap-2"
                                            >
                                                <LogOut className="w-5 h-5" />
                                                {hasPendingSignOut() ? 'Pending Approval...' : 'Sign Out'}
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-xl shadow-sm p-6">
                                    <h2 className="text-xl font-bold text-gray-900 mb-4">Today's Summary</h2>
                                    
                                    <div className="bg-indigo-50 rounded-lg p-6 mb-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <p className="text-sm text-indigo-600 font-medium mb-1">Total Time Today</p>
                                                <p className="text-3xl font-bold text-indigo-900">
                                                    {calculateTodayTotal(currentUser.id)}
                                                </p>
                                            </div>
                                            <div>
                                                <p className="text-sm text-indigo-600 font-medium mb-1">Today's Earnings</p>
                                                <p className="text-3xl font-bold text-indigo-900">
                                                    ${formatTimeWithPay(calculateTotalMinutes(getTodaysSessions(currentUser.id))).pay}
                                                </p>
                                                <p className="text-xs text-indigo-600 mt-1">@ $25.00/hour</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        {getTodaysSessions(currentUser.id).map(session => (
                                            <div key={session.id} className="border border-gray-200 rounded-lg p-4">
                                                <div className="flex justify-between items-start mb-2">
                                                    <div>
                                                        <p className="font-semibold text-gray-900">{events[session.eventCode]?.name}</p>
                                                        <p className="text-sm text-gray-500">{session.eventCode}</p>
                                                    </div>
                                                    <span className={`px-3 py-1 rounded-full text-xs font-semibold ${
                                                        session.signOutTime 
                                                            ? 'bg-gray-100 text-gray-700' 
                                                            : 'bg-green-100 text-green-700'
                                                    }`}>
                                                        {session.signOutTime ? 'Completed' : 'Active'}
                                                    </span>
                                                </div>
                                                <div className="grid grid-cols-3 gap-4 text-sm">
                                                    <div>
                                                        <p className="text-gray-500">Sign In</p>
                                                        <p className="font-medium text-gray-900">
                                                            {new Date(session.signInTime).toLocaleTimeString()}
                                                        </p>
                                                    </div>
                                                    <div>
                                                        <p className="text-gray-500">Sign Out</p>
                                                        <p className="font-medium text-gray-900">
                                                            {session.signOutTime 
                                                                ? new Date(session.signOutTime).toLocaleTimeString()
                                                                : '-'}
                                                        </p>
                                                    </div>
                                                    <div>
                                                        <p className="text-gray-500">Duration</p>
                                                        <p className="font-medium text-gray-900">
                                                            {calculateDuration(session.signInTime, session.signOutTime)}
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        {getTodaysSessions(currentUser.id).length === 0 && (
                                            <p className="text-center text-gray-500 py-8">No sessions today</p>
                                        )}
                                    </div>
                                </div>

                                <div className="bg-white rounded-xl shadow-sm p-6">
                                    <h2 className="text-xl font-bold text-gray-900 mb-4">Earnings by Event</h2>
                                    {(() => {
                                        const { eventTotals, grandTotal } = calculatePersonnelEventTotals(currentUser.id);
                                        const grandTotalFormatted = formatTimeWithPay(grandTotal);
                                        
                                        return (
                                            <>
                                                <div className="space-y-3 mb-4">
                                                    {Object.entries(eventTotals).map(([eventCode, minutes]) => {
                                                        const formatted = formatTimeWithPay(minutes);
                                                        return (
                                                            <div key={eventCode} className="border border-gray-200 rounded-lg p-4">
                                                                <div className="flex justify-between items-center">
                                                                    <div>
                                                                        <p className="font-semibold text-gray-900">
                                                                            {events[eventCode]?.name || eventCode}
                                                                        </p>
                                                                        <p className="text-sm text-gray-500">{eventCode}</p>
                                                                    </div>
                                                                    <div className="text-right">
                                                                        <p className="text-xl font-bold text-green-600">
                                                                            ${formatted.pay}
                                                                        </p>
                                                                        <p className="text-sm text-gray-500">
                                                                            {formatted.time} ({formatted.hours} hrs)
                                                                        </p>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                                
                                                {Object.keys(eventTotals).length > 0 && (
                                                    <div className="bg-green-50 rounded-lg p-4 border-2 border-green-200">
                                                        <div className="flex justify-between items-center">
                                                            <p className="font-semibold text-green-900">Total Earnings (All Events)</p>
                                                            <div className="text-right">
                                                                <p className="text-2xl font-bold text-green-700">
                                                                    ${grandTotalFormatted.pay}
                                                                </p>
                                                                <p className="text-sm text-green-600">
                                                                    {grandTotalFormatted.time} ({grandTotalFormatted.hours} hrs)
                                                                </p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}
                                                
                                                {Object.keys(eventTotals).length === 0 && (
                                                    <p className="text-center text-gray-500 py-8">No completed sessions yet</p>
                                                )}
                                            </>
                                        );
                                    })()}
                                </div>
                            </div>
                        )}

                        {userRole === 'admin' && (
                            <div className="space-y-6">
                                {getPendingCount() > 0 && (
                                    <div className="bg-yellow-50 border-2 border-yellow-400 rounded-xl p-6 shadow-lg">
                                        <div className="flex items-center justify-between mb-4">
                                            <div className="flex items-center gap-3">
                                                <div className="bg-yellow-400 rounded-full p-2 animate-pulse">
                                                    <Clock className="w-6 h-6 text-white" />
                                                </div>
                                                <div>
                                                    <h2 className="text-xl font-bold text-yellow-900">Pending Approvals Required</h2>
                                                    <p className="text-sm text-yellow-700">
                                                        {getPendingCount()} request{getPendingCount() > 1 ? 's' : ''} awaiting your approval
                                                    </p>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="space-y-3">
                                            {pendingApprovals
                                                .filter(p => p.status === 'pending')
                                                .sort((a, b) => new Date(a.requestTime) - new Date(b.requestTime))
                                                .map(request => (
                                                    <div key={request.id} className="bg-white border-2 border-yellow-200 rounded-lg p-4 shadow-sm">
                                                        <div className="flex justify-between items-start mb-3">
                                                            <div className="flex-1">
                                                                <div className="flex items-center gap-2 mb-2">
                                                                    <span className={`px-3 py-1 rounded-full text-xs font-bold ${
                                                                        request.type === 'sign-in' 
                                                                            ? 'bg-green-100 text-green-700' 
                                                                            : 'bg-red-100 text-red-700'
                                                                    }`}>
                                                                        {request.type === 'sign-in' ? 'SIGN-IN REQUEST' : 'SIGN-OUT REQUEST'}
                                                                    </span>
                                                                </div>
                                                                <p className="font-bold text-gray-900 text-lg">{request.personnelName}</p>
                                                                <p className="text-sm text-gray-600">ID: {request.personnelId}</p>
                                                                <p className="text-sm text-gray-600 mt-1">
                                                                    Event: <span className="font-semibold">{events[request.eventCode]?.name || request.eventCode}</span>
                                                                </p>
                                                                <p className="text-xs text-gray-500 mt-2">
                                                                    Requested: {new Date(request.requestTime).toLocaleString()}
                                                                </p>
                                                            </div>
                                                            <div className="flex gap-2">
                                                                <button
                                                                    onClick={() => approveRequest(request.id)}
                                                                    className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-semibold transition duration-200 flex items-center gap-2"
                                                                >
                                                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                                                                    </svg>
                                                                    Approve
                                                                </button>
                                                                <button
                                                                    onClick={() => denyRequest(request.id)}
                                                                    className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-semibold transition duration-200 flex items-center gap-2"
                                                                >
                                                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                                                    </svg>
                                                                    Deny
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                        </div>
                                    </div>
                                )}

                                <div className="bg-white rounded-xl shadow-sm p-6">
                                    <div className="flex items-center gap-2 mb-6">
                                        <Shield className="w-6 h-6 text-indigo-600" />
                                        <h2 className="text-xl font-bold text-gray-900">Administrator Controls</h2>
                                    </div>

                                    <div className="mb-6 pb-6 border-b">
                                        <button
                                            onClick={() => toggleSection('addEvent')}
                                            className="flex items-center justify-between w-full text-left mb-3"
                                        >
                                            <h3 className="text-lg font-semibold text-gray-800">Add Event Code</h3>
                                            {expandedSections.addEvent ? <ChevronUp className="w-5 h-5" /> : <ChevronDown className="w-5 h-5" />}
                                        </button>
                                        
                                        {expandedSections.addEvent && (
                                            <div className="grid grid-cols-2 gap-3">
                                                <input
                                                    type="text"
                                                    value={newEventCode}
                                                    onChange={(e) => setNewEventCode(e.target.value)}
                                                    placeholder="Event Code (e.g., EV001)"
                                                    className="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                                />
                                                <input
                                                    type="text"
                                                    value={newEventName}
                                                    onChange={(e) => setNewEventName(e.target.value)}
                                                    placeholder="Event Name"
                                                    className="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                                />
                                                <button
                                                    onClick={addEvent}
                                                    className="col-span-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition duration-200"
                                                >
                                                    Add Event
                                                </button>
                                            </div>
                                        )}
                                    </div>

                                    <div className="mb-6 pb-6 border-b">
                                        <button
                                            onClick={() => toggleSection('addPersonnel')}
                                            className="flex items-center justify-between w-full text-left mb-3"
                                        >
                                            <h3 className="text-lg font-semibold text-gray-800">Add Personnel</h3>
                                            {expandedSections.addPersonnel ? <ChevronUp className="w-5 h-5" /> : <ChevronDown className="w-5 h-5" />}
                                        </button>
                                        
                                        {expandedSections.addPersonnel && (
                                            <div className="grid grid-cols-2 gap-3">
                                                <input
                                                    type="text"
                                                    value={newPersonnelId}
                                                    onChange={(e) => setNewPersonnelId(e.target.value)}
                                                    placeholder="Personnel ID"
                                                    className="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                                />
                                                <input
                                                    type="text"
                                                    value={newPersonnelName}
                                                    onChange={(e) => setNewPersonnelName(e.target.value)}
                                                    placeholder="Full Name"
                                                    className="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                                />
                                                <input
                                                    type="password"
                                                    value={newPersonnelPin}
                                                    onChange={(e) => setNewPersonnelPin(e.target.value)}
                                                    placeholder="PIN"
                                                    className="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                                />
                                                <select
                                                    value={newPersonnelRole}
                                                    onChange={(e) => setNewPersonnelRole(e.target.value)}
                                                    className="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                                >
                                                    <option value="personnel">Personnel</option>
                                                    <option value="admin">Administrator</option>
                                                </select>
                                                <button
                                                    onClick={addPersonnel}
                                                    className="col-span-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition duration-200"
                                                >
                                                    Add Personnel
                                                </button>
                                            </div>
                                        )}
                                    </div>

                                    <div className="mb-6 pb-6 border-b">
                                        <h3 className="text-lg font-semibold text-gray-800 mb-3">Active Events</h3>
                                        <div className="grid grid-cols-2 gap-2">
                                            {Object.values(events).map(event => (
                                                <div key={event.code} className="bg-gray-50 px-4 py-2 rounded-lg">
                                                    <p className="font-semibold text-gray-900">{event.code}</p>
                                                    <p className="text-sm text-gray-600">{event.name}</p>
                                                </div>
                                            ))}
                                            {Object.keys(events).length === 0 && (
                                                <p className="col-span-2 text-center text-gray-500 py-4">No events added yet</p>
                                            )}
                                        </div>
                                    </div>

                                    <div>
                                        <h3 className="text-lg font-semibold text-gray-800 mb-3">Personnel Roster</h3>
                                        <div className="space-y-2">
                                            {Object.values(personnel).map(person => (
                                                <div key={person.id} className="bg-gray-50 px-4 py-3 rounded-lg flex justify-between items-center">
                                                    <div>
                                                        <p className="font-semibold text-gray-900">{person.name}</p>
                                                        <p className="text-sm text-gray-600">ID: {person.id}</p>
                                                    </div>
                                                    <span className={`px-3 py-1 rounded-full text-xs font-semibold ${
                                                        person.role === 'admin' 
                                                            ? 'bg-indigo-100 text-indigo-700' 
                                                            : 'bg-gray-200 text-gray-700'
                                                    }`}>
                                                        {person.role === 'admin' ? 'Admin' : 'Personnel'}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-xl shadow-sm p-6">
                                    <button
                                        onClick={() => toggleSection('approvalHistory')}
                                        className="flex items-center justify-between w-full text-left mb-4"
                                    >
                                        <h2 className="text-xl font-bold text-gray-900">Approval History</h2>
                                        {expandedSections.approvalHistory ? <ChevronUp className="w-5 h-5" /> : <ChevronDown className="w-5 h-5" />}
                                    </button>

                                    {expandedSections.approvalHistory && (
                                        <div className="space-y-2">
                                            {pendingApprovals
                                                .filter(p => p.status !== 'pending')
                                                .sort((a, b) => {
                                                    const aTime = a.status === 'approved' ? a.approvedAt : a.deniedAt;
                                                    const bTime = b.status === 'approved' ? b.approvedAt : b.deniedAt;
                                                    return new Date(bTime) - new Date(aTime);
                                                })
                                                .slice(0, 20)
                                                .map(request => (
                                                    <div key={request.id} className={`border rounded-lg p-3 ${
                                                        request.status === 'approved' ? 'border-green-200 bg-green-50' : 'border-red-200 bg-red-50'
                                                    }`}>
                                                        <div className="flex justify-between items-start">
                                                            <div>
                                                                <div className="flex items-center gap-2 mb-1">
                                                                    <span className={`px-2 py-0.5 rounded-full text-xs font-semibold ${
                                                                        request.status === 'approved'
                                                                            ? 'bg-green-200 text-green-800'
                                                                            : 'bg-red-200 text-red-800'
                                                                    }`}>
                                                                        {request.status.toUpperCase()}
                                                                    </span>
                                                                    <span className="text-xs font-medium text-gray-600">
                                                                        {request.type === 'sign-in' ? 'Sign-In' : 'Sign-Out'}
                                                                    </span>
                                                                </div>
                                                                <p className="font-semibold text-gray-900">{request.personnelName}</p>
                                                                <p className="text-xs text-gray-600">
                                                                    {events[request.eventCode]?.name || request.eventCode}
                                                                </p>
                                                                <p className="text-xs text-gray-500 mt-1">
                                                                    {request.status === 'approved' 
                                                                        ? `Approved by ${request.approvedBy} at ${new Date(request.approvedAt).toLocaleString()}`
                                                                        : `Denied by ${request.deniedBy} at ${new Date(request.deniedAt).toLocaleString()}`
                                                                    }
                                                                </p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            {pendingApprovals.filter(p => p.status !== 'pending').length === 0 && (
                                                <p className="text-center text-gray-500 py-4">No approval history yet</p>
                                            )}
                                        </div>
                                    )}
                                </div>

                                <div className="bg-white rounded-xl shadow-sm p-6">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-xl font-bold text-gray-900">Attendance Reports</h2>
                                        <button
                                            onClick={exportReport}
                                            className="flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition duration-200"
                                        >
                                            <Download className="w-4 h-4" />
                                            Export CSV
                                        </button>
                                    </div>

                                    <p className="text-center text-gray-500 py-8">
                                        Admin report sections available - expand events to view details
                                    </p>
                                </div>

                                <div className="bg-white rounded-xl shadow-sm p-6">
                                    <h2 className="text-xl font-bold text-gray-900 mb-4">Personnel Daily Totals</h2>
                                    <div className="space-y-3">
                                        {Object.values(personnel).filter(p => p.role !== 'admin').map(person => {
                                            const todayTotal = calculateTodayTotal(person.id);
                                            const todaySessions = getTodaysSessions(person.id);
                                            const todayMinutes = calculateTotalMinutes(todaySessions);
                                            const todayFormatted = formatTimeWithPay(todayMinutes);
                                            
                                            return (
                                                <div key={person.id} className="border border-gray-200 rounded-lg p-4">
                                                    <div className="flex justify-between items-center">
                                                        <div>
                                                            <p className="font-semibold text-gray-900">{person.name}</p>
                                                            <p className="text-sm text-gray-500">ID: {person.id}</p>
                                                        </div>
                                                        <div className="text-right">
                                                            <p className="text-2xl font-bold text-green-600">${todayFormatted.pay}</p>
                                                            <p className="text-sm text-gray-500">
                                                                {todayTotal} • {todaySessions.length} sessions today
                                                            </p>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {Object.values(personnel).filter(p => p.role !== 'admin').length === 0 && (
                                            <p className="text-center text-gray-500 py-8">No personnel added yet</p>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AttendanceTracker />);
    </script>
</body>
</html>
