<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ── Supabase client ──────────────────────────────────────────
        const SUPABASE_URL = 'https://ohvypbotqdymcrfbbbof.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Pm0BPkdXLl6A5tijEj0LsQ_S4zXIAP7';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Lucide React Icons (inline SVG components)
        const Clock = ({ className, ...props }) => (
            <svg className={className} {...props} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
        );

        const Users = ({ className, ...props }) => (
            <svg className={className} {...props} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
        );

        const LogIn = ({ className, ...props }) => (
            <svg className={className} {...props} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                <polyline points="10 17 15 12 10 7"></polyline>
                <line x1="15" y1="12" x2="3" y2="12"></line>
            </svg>
        );

        const LogOut = ({ className, ...props }) => (
            <svg className={className} {...props} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
        );

        const Shield = ({ className, ...props }) => (
            <svg className={className} {...props} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
        );

        const ChevronDown = ({ className, ...props }) => (
            <svg className={className} {...props} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        );

        const ChevronUp = ({ className, ...props }) => (
            <svg className={className} {...props} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="18 15 12 9 6 15"></polyline>
            </svg>
        );

        const Download = ({ className, ...props }) => (
            <svg className={className} {...props} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
        );

        const AttendanceTracker = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [userRole, setUserRole] = useState(null);
            const [personnel, setPersonnel] = useState({});
            const [events, setEvents] = useState({});
            const [sessions, setSessions] = useState([]);
            const [pendingApprovals, setPendingApprovals] = useState([]);
            const [selectedEvent, setSelectedEvent] = useState('');
            const [showLogin, setShowLogin] = useState(true);
            const [expandedSections, setExpandedSections] = useState({});
            const [loading, setLoading] = useState(true);

            // Report state
            const [reportType, setReportType] = useState('sp');
            const [reportSP, setReportSP] = useState('all');
            const [reportEvent, setReportEvent] = useState('all');
            const [reportCustomStart, setReportCustomStart] = useState('');
            const [reportCustomEnd, setReportCustomEnd] = useState('');

            // Invoice state
            const [invoiceSP, setInvoiceSP] = useState('');
            const [invoiceEvent, setInvoiceEvent] = useState('');
            const [billedToName, setBilledToName] = useState('Organization Name');
            const [billedToAddress, setBilledToAddress] = useState('123 Main Street, City, State 00000');
            const [editingBilledTo, setEditingBilledTo] = useState(false);
            
            const [loginId, setLoginId] = useState('');
            const [loginPin, setLoginPin] = useState('');
            const [loginError, setLoginError] = useState('');

            const [newEventCode, setNewEventCode] = useState('');
            const [newEventName, setNewEventName] = useState('');
            const [newPersonnelId, setNewPersonnelId] = useState('');
            const [newPersonnelName, setNewPersonnelName] = useState('');
            const [newPersonnelPin, setNewPersonnelPin] = useState('');
            const [newPersonnelRole, setNewPersonnelRole] = useState('personnel');

            useEffect(() => {
                loadData();
            }, []);

            useEffect(() => {
                // saveData is a no-op — Supabase handles persistence inline
            }, [personnel, events, sessions, pendingApprovals]);

            const normSession = s => ({
                ...s,
                personnelId: s.personnelid || s.personnelId,
                personnelName: s.personnelname || s.personnelName,
                eventCode: s.eventcode || s.eventCode,
                signInTime: s.signintime || s.signInTime,
                signOutTime: s.signouttime || s.signOutTime || null,
                approvedBy: s.approvedby || s.approvedBy,
                approvedAt: s.approvedat || s.approvedAt,
                signOutApprovedBy: s.signoutapprovedby || s.signOutApprovedBy,
                signOutApprovedAt: s.signoutapprovedat || s.signOutApprovedAt,
            });

            const normPending = p => ({
                ...p,
                personnelId: p.personnelid || p.personnelId,
                personnelName: p.personnelname || p.personnelName,
                eventCode: p.eventcode || p.eventCode,
                requestTime: p.requesttime || p.requestTime,
                sessionId: p.sessionid || p.sessionId,
                approvedBy: p.approvedby || p.approvedBy,
                approvedAt: p.approvedat || p.approvedAt,
                deniedBy: p.deniedby || p.deniedBy,
                deniedAt: p.deniedat || p.deniedAt,
            });

            const loadData = async () => {
                try {
                    const [{ data: personnelData }, { data: eventsData }, { data: sessionsData }, { data: pendingData }] = await Promise.all([
                        supabase.from('personnel').select('*'),
                        supabase.from('events').select('*'),
                        supabase.from('sessions').select('*'),
                        supabase.from('pending_approvals').select('*'),
                    ]);

                    const personnelMap = {};
                    (personnelData || []).forEach(p => { personnelMap[p.id] = p; });

                    if (Object.keys(personnelMap).length === 0) {
                        const defaultAdmin = { id: 'admin', name: 'Administrator', pin: '1234', role: 'admin' };
                        await supabase.from('personnel').insert([defaultAdmin]);
                        personnelMap['admin'] = defaultAdmin;
                    }
                    setPersonnel(personnelMap);

                    const eventsMap = {};
                    (eventsData || []).forEach(e => { eventsMap[e.code] = e; });
                    setEvents(eventsMap);

                    setSessions((sessionsData || []).map(normSession));
                    setPendingApprovals((pendingData || []).map(normPending));
                } catch (error) {
                    console.error('Error loading data:', error);
                    setPersonnel({ 'admin': { id: 'admin', name: 'Administrator', pin: '1234', role: 'admin' } });
                } finally {
                    setLoading(false);
                }
            };

            const createDefaultAdmin = async () => {
                const defaultAdmin = { id: 'admin', name: 'Administrator', pin: '1234', role: 'admin' };
                await supabase.from('personnel').upsert([defaultAdmin]);
                setPersonnel({ 'admin': defaultAdmin });
                alert('Admin account reset to default credentials');
            };

            const saveData = () => {
                // No-op: Supabase saves are done inline at each operation
            };

            const handleLogin = () => {
                const user = personnel[loginId];
                if (!user) {
                    setLoginError('Personnel ID not found');
                    return;
                }
                if (user.pin !== loginPin) {
                    setLoginError('Incorrect PIN');
                    return;
                }
                setCurrentUser(user);
                setUserRole(user.role);
                setShowLogin(false);
                setLoginError('');
                setLoginId('');
                setLoginPin('');
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setUserRole(null);
                setShowLogin(true);
                setSelectedEvent('');
            };

            const handleSignIn = async () => {
                if (!selectedEvent) {
                    alert('Please select an event code');
                    return;
                }

                const hasPendingSignIn = pendingApprovals.some(
                    p => p.personnelId === currentUser.id && 
                    p.eventCode === selectedEvent && 
                    p.type === 'sign-in' &&
                    p.status === 'pending'
                );

                if (hasPendingSignIn) {
                    alert('You already have a pending sign-in request for this event. Please wait for admin approval.');
                    return;
                }

                const hasActiveSession = sessions.some(
                    s => s.personnelId === currentUser.id && 
                    s.eventCode === selectedEvent && 
                    !s.signOutTime
                );

                if (hasActiveSession) {
                    alert('You are already signed in to this event.');
                    return;
                }

                const pendingRequest = {
                    id: Date.now().toString(),
                    type: 'sign-in',
                    personnelid: currentUser.id,
                    personnelname: currentUser.name,
                    eventcode: selectedEvent,
                    requesttime: new Date().toISOString(),
                    status: 'pending'
                };

                const { data, error } = await supabase.from('pending_approvals').insert([pendingRequest]).select();
                if (!error && data) {
                    setPendingApprovals([...pendingApprovals, {...pendingRequest, personnelId: pendingRequest.personnelid, personnelName: pendingRequest.personnelname, eventCode: pendingRequest.eventcode, requestTime: pendingRequest.requesttime}]);
                }
                alert('Sign-in request submitted. Please wait for administrator approval.');
            };

            const handleSignOut = async () => {
                const activeSession = sessions.find(
                    s => s.personnelId === currentUser.id && 
                    s.eventCode === selectedEvent && 
                    !s.signOutTime
                );

                if (!activeSession) {
                    alert('No active session found for this event');
                    return;
                }

                const hasPendingSignOut = pendingApprovals.some(
                    p => p.sessionId === activeSession.id && 
                    p.type === 'sign-out' &&
                    p.status === 'pending'
                );

                if (hasPendingSignOut) {
                    alert('You already have a pending sign-out request. Please wait for admin approval.');
                    return;
                }

                const pendingRequest = {
                    id: Date.now().toString(),
                    type: 'sign-out',
                    sessionid: activeSession.id,
                    personnelid: currentUser.id,
                    personnelname: currentUser.name,
                    eventcode: selectedEvent,
                    requesttime: new Date().toISOString(),
                    status: 'pending'
                };

                const { data, error } = await supabase.from('pending_approvals').insert([pendingRequest]).select();
                if (!error && data) {
                    setPendingApprovals([...pendingApprovals, {...pendingRequest, sessionId: pendingRequest.sessionid, personnelId: pendingRequest.personnelid, personnelName: pendingRequest.personnelname, eventCode: pendingRequest.eventcode, requestTime: pendingRequest.requesttime}]);
                }
                alert('Sign-out request submitted. Please wait for administrator approval.');
            };

            const approveRequest = async (requestId) => {
                const request = pendingApprovals.find(p => p.id === requestId);
                if (!request) return;

                if (request.type === 'sign-in') {
                    const newSession = {
                        id: Date.now().toString(),
                        personnelid: request.personnelId || request.personnelid,
                        personnelname: request.personnelName || request.personnelname,
                        eventcode: request.eventCode || request.eventcode,
                        signintime: request.requestTime || request.requesttime,
                        signouttime: null,
                        approvedby: currentUser.name,
                        approvedat: new Date().toISOString()
                    };
                    const { data } = await supabase.from('sessions').insert([newSession]).select();
                    if (data) {
                        const normalized = { ...newSession, personnelId: newSession.personnelid, personnelName: newSession.personnelname, eventCode: newSession.eventcode, signInTime: newSession.signintime, signOutTime: null, approvedBy: newSession.approvedby, approvedAt: newSession.approvedat };
                        setSessions([...sessions, normalized]);
                    }
                } else if (request.type === 'sign-out') {
                    const sid = request.sessionId || request.sessionid;
                    const now = new Date().toISOString();
                    await supabase.from('sessions').update({ signouttime: request.requestTime || request.requesttime, signoutapprovedby: currentUser.name, signoutapprovedat: now }).eq('id', sid);
                    setSessions(sessions.map(s =>
                        s.id === sid
                            ? { ...s, signOutTime: request.requestTime || request.requesttime, signOutApprovedBy: currentUser.name, signOutApprovedAt: now }
                            : s
                    ));
                }

                await supabase.from('pending_approvals').update({ status: 'approved', approvedby: currentUser.name, approvedat: new Date().toISOString() }).eq('id', requestId);
                setPendingApprovals(pendingApprovals.map(p =>
                    p.id === requestId
                        ? { ...p, status: 'approved', approvedBy: currentUser.name, approvedAt: new Date().toISOString() }
                        : p
                ));
            };

            const denyRequest = async (requestId) => {
                await supabase.from('pending_approvals').update({ status: 'denied', deniedby: currentUser.name, deniedat: new Date().toISOString() }).eq('id', requestId);
                setPendingApprovals(pendingApprovals.map(p =>
                    p.id === requestId
                        ? { ...p, status: 'denied', deniedBy: currentUser.name, deniedAt: new Date().toISOString() }
                        : p
                ));
            };

            const addEvent = async () => {
                if (!newEventCode || !newEventName) {
                    alert('Please enter both event code and name');
                    return;
                }
                const newEvent = { code: newEventCode, name: newEventName };
                const { error } = await supabase.from('events').insert([newEvent]);
                if (error) { alert('Error adding event: ' + error.message); return; }
                setEvents({ ...events, [newEventCode]: newEvent });
                setNewEventCode('');
                setNewEventName('');
            };

            const addPersonnel = async () => {
                if (!newPersonnelId || !newPersonnelName || !newPersonnelPin) {
                    alert('Please fill in all fields');
                    return;
                }
                if (personnel[newPersonnelId]) {
                    alert('Personnel ID already exists');
                    return;
                }
                const newPerson = { id: newPersonnelId, name: newPersonnelName, pin: newPersonnelPin, role: newPersonnelRole };
                const { error } = await supabase.from('personnel').insert([newPerson]);
                if (error) { alert('Error adding personnel: ' + error.message); return; }
                setPersonnel({ ...personnel, [newPersonnelId]: newPerson });
                setNewPersonnelId('');
                setNewPersonnelName('');
                setNewPersonnelPin('');
                setNewPersonnelRole('personnel');
            };

            const calculateDuration = (signIn, signOut) => {
                if (!signOut) return 'Active';
                const diff = new Date(signOut) - new Date(signIn);
                const hours = Math.floor(diff / 3600000);
                const minutes = Math.floor((diff % 3600000) / 60000);
                return `${hours}h ${minutes}m`;
            };

            const getTodaysSessions = (personnelId) => {
                const today = new Date().toDateString();
                return sessions.filter(s => 
                    s.personnelId === personnelId && 
                    new Date(s.signInTime).toDateString() === today
                );
            };

            const calculateTodayTotal = (personnelId) => {
                const todaySessions = getTodaysSessions(personnelId);
                let totalMinutes = 0;
                
                todaySessions.forEach(session => {
                    if (session.signOutTime) {
                        const diff = new Date(session.signOutTime) - new Date(session.signInTime);
                        totalMinutes += diff / 60000;
                    }
                });

                const hours = Math.floor(totalMinutes / 60);
                const minutes = Math.floor(totalMinutes % 60);
                return `${hours}h ${minutes}m`;
            };

            const calculateTotalMinutes = (sessions) => {
                let totalMinutes = 0;
                sessions.forEach(session => {
                    if (session.signOutTime) {
                        const diff = new Date(session.signOutTime) - new Date(session.signInTime);
                        totalMinutes += diff / 60000;
                    }
                });
                return totalMinutes;
            };

            const formatTimeWithPay = (totalMinutes) => {
                const hours = Math.floor(totalMinutes / 60);
                const minutes = Math.floor(totalMinutes % 60);
                const pay = (totalMinutes / 60) * 25;
                return {
                    time: `${hours}h ${minutes}m`,
                    hours: (totalMinutes / 60).toFixed(2),
                    pay: pay.toFixed(2)
                };
            };

            const calculatePersonnelEventTotals = (personnelId) => {
                const personnelSessions = sessions.filter(s => s.personnelId === personnelId && s.signOutTime);
                const eventTotals = {};
                let grandTotal = 0;

                personnelSessions.forEach(session => {
                    const minutes = (new Date(session.signOutTime) - new Date(session.signInTime)) / 60000;
                    if (!eventTotals[session.eventCode]) {
                        eventTotals[session.eventCode] = 0;
                    }
                    eventTotals[session.eventCode] += minutes;
                    grandTotal += minutes;
                });

                return { eventTotals, grandTotal };
            };

            const calculateEventTotals = (eventCode) => {
                const eventSessions = sessions.filter(s => s.eventCode === eventCode && s.signOutTime);
                const personnelTotals = {};
                let eventGrandTotal = 0;

                eventSessions.forEach(session => {
                    const minutes = (new Date(session.signOutTime) - new Date(session.signInTime)) / 60000;
                    if (!personnelTotals[session.personnelId]) {
                        personnelTotals[session.personnelId] = {
                            name: session.personnelName,
                            minutes: 0
                        };
                    }
                    personnelTotals[session.personnelId].minutes += minutes;
                    eventGrandTotal += minutes;
                });

                return { personnelTotals, eventGrandTotal };
            };

            const getSessionsByEvent = () => {
                const grouped = {};
                sessions.forEach(session => {
                    if (!grouped[session.eventCode]) {
                        grouped[session.eventCode] = [];
                    }
                    grouped[session.eventCode].push(session);
                });
                return grouped;
            };

            const exportReport = () => {
                const csvContent = [
                    ['Personnel ID', 'Personnel Name', 'Event Code', 'Sign In', 'Sign Out', 'Duration', 'Hours', 'Pay ($25/hr)'].join(','),
                    ...sessions.map(s => {
                        const minutes = s.signOutTime 
                            ? (new Date(s.signOutTime) - new Date(s.signInTime)) / 60000
                            : 0;
                        const formatted = formatTimeWithPay(minutes);
                        return [
                            s.personnelId,
                            s.personnelName,
                            s.eventCode,
                            new Date(s.signInTime).toLocaleString(),
                            s.signOutTime ? new Date(s.signOutTime).toLocaleString() : 'Active',
                            calculateDuration(s.signInTime, s.signOutTime),
                            s.signOutTime ? formatted.hours : '0',
                            s.signOutTime ? formatted.pay : '0.00'
                        ].join(',');
                    })
                ].join('\n');

                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `attendance-report-${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
            };

            const toggleSection = (section) => {
                setExpandedSections(prev => ({
                    ...prev,
                    [section]: !prev[section]
                }));
            };

            // ── Report date range helpers ──────────────────────────────
            const getDateRange = () => {
                if (!reportCustomStart || !reportCustomEnd) return { start: null, end: null, label: '' };
                return {
                    start: new Date(reportCustomStart + 'T00:00:00'),
                    end: new Date(reportCustomEnd + 'T23:59:59'),
                    label: `${reportCustomStart} to ${reportCustomEnd}`
                };
            };

            const filterSessionsByRange = (sessArr, start, end) => {
                if (!start || !end) return sessArr;
                return sessArr.filter(s => {
                    const t = new Date(s.signInTime);
                    return t >= start && t <= end;
                });
            };

            // ── PDF generation ─────────────────────────────────────────
            const generatePDFContent = () => {
                const { start, end, label } = getDateRange();
                if (!start || !end) { alert('Please select a start and end date.'); return null; }

                const filtered = filterSessionsByRange(sessions.filter(s => s.signOutTime), start, end);

                let title, rows, summaryRows;

                if (reportType === 'sp') {
                    // Filter by specific SP or all
                    const spList = reportSP === 'all'
                        ? Object.values(personnel).filter(p => p.role !== 'admin')
                        : [personnel[reportSP]].filter(Boolean);

                    title = reportSP === 'all' ? 'All SPs Report' : `SP Report: ${personnel[reportSP]?.name || reportSP}`;

                    rows = spList.map(sp => {
                        const spSessions = filtered.filter(s => s.personnelId === sp.id);
                        const byEvent = {};
                        spSessions.forEach(s => {
                            const mins = (new Date(s.signOutTime) - new Date(s.signInTime)) / 60000;
                            if (!byEvent[s.eventCode]) byEvent[s.eventCode] = 0;
                            byEvent[s.eventCode] += mins;
                        });
                        const totalMins = spSessions.reduce((acc, s) =>
                            acc + (new Date(s.signOutTime) - new Date(s.signInTime)) / 60000, 0);
                        return { sp, byEvent, totalMins };
                    });

                } else {
                    // By event
                    const eventList = reportEvent === 'all'
                        ? Object.values(events)
                        : [events[reportEvent]].filter(Boolean);

                    title = reportEvent === 'all' ? 'All Events Report' : `Event Report: ${events[reportEvent]?.name || reportEvent}`;

                    rows = eventList.map(ev => {
                        const evSessions = filtered.filter(s => s.eventCode === ev.code);
                        const byPerson = {};
                        evSessions.forEach(s => {
                            const mins = (new Date(s.signOutTime) - new Date(s.signInTime)) / 60000;
                            if (!byPerson[s.personnelId]) byPerson[s.personnelId] = { name: s.personnelName, mins: 0 };
                            byPerson[s.personnelId].mins += mins;
                        });
                        const totalMins = evSessions.reduce((acc, s) =>
                            acc + (new Date(s.signOutTime) - new Date(s.signInTime)) / 60000, 0);
                        return { ev, byPerson, totalMins };
                    });
                }

                return { title, rows, label, start, end, reportType };
            };

            const buildPDFHtml = (data) => {
                const { title, rows, label, reportType } = data;
                const now = new Date().toLocaleString();
                const fmtMins = m => {
                    const h = Math.floor(m / 60), mn = Math.round(m % 60);
                    return `${h}h ${mn.toString().padStart(2,'0')}m`;
                };
                const fmtPay = m => `$${((m / 60) * 25).toFixed(2)}`;
                const fmtHrs = m => (m / 60).toFixed(2);

                let bodyHtml = '';

                if (reportType === 'sp') {
                    rows.forEach(({ sp, byEvent, totalMins }) => {
                        const breakdownRows = Object.entries(byEvent).map(([code, mins]) =>
                            `<tr>
                                <td style="padding:6px 12px;border-bottom:1px solid #e5e7eb;color:#374151;">${events[code]?.name || code}</td>
                                <td style="padding:6px 12px;border-bottom:1px solid #e5e7eb;text-align:center;color:#374151;">${code}</td>
                                <td style="padding:6px 12px;border-bottom:1px solid #e5e7eb;text-align:right;color:#374151;">${fmtHrs(mins)}</td>

                                            <button
                                                onClick={() => setReportType('event')}
                                                className={`flex-1 py-2 rounded-lg font-semibold text-sm transition duration-200 ${reportType === 'event' ? 'bg-cyan-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}
                                            >
                                                By Event/Program
                                            </button>
                                        </div>
                                    </div>

                                    {/* Date Range */}
                                    <div className="mb-5">
                                        <p className="text-sm font-semibold text-gray-700 mb-2">Date Range</p>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <label className="block text-xs text-gray-500 mb-1">Start Date</label>
                                                <input type="date" value={reportCustomStart} onChange={e => setReportCustomStart(e.target.value)}
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500" />
                                            </div>
                                            <div>
                                                <label className="block text-xs text-gray-500 mb-1">End Date</label>
                                                <input type="date" value={reportCustomEnd} onChange={e => setReportCustomEnd(e.target.value)}
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500" />
                                            </div>
                                        </div>
                                    </div>

                                    {/* SP / Event Filter */}
                                    {reportType === 'sp' ? (
                                        <div className="mb-5">
                                            <p className="text-sm font-semibold text-gray-700 mb-2">Select SP</p>
                                            <select
                                                value={reportSP}
                                                onChange={e => setReportSP(e.target.value)}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 text-sm"
                                            >
                                                <option value="all">All SPs</option>
                                                {Object.values(personnel).filter(p => p.role !== 'admin').map(p => (
                                                    <option key={p.id} value={p.id}>{p.name} ({p.id})</option>
                                                ))}
                                            </select>
                                        </div>
                                    ) : (
                                        <div className="mb-5">
                                            <p className="text-sm font-semibold text-gray-700 mb-2">Select Event</p>
                                            <select
                                                value={reportEvent}
                                                onChange={e => setReportEvent(e.target.value)}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 text-sm"
                                            >
                                                <option value="all">All Events</option>
                                                {Object.values(events).map(ev => (
                                                    <option key={ev.code} value={ev.code}>{ev.name} ({ev.code})</option>
                                                ))}
                                            </select>
                                        </div>
                                    )}

                                    {/* Preview label */}
                                    {reportCustomStart && reportCustomEnd && (
                                        <div className="mb-5 px-4 py-3 bg-indigo-50 rounded-lg">
                                            <p className="text-xs text-indigo-600 font-semibold">Report Period</p>
                                            <p className="text-sm text-indigo-900 font-medium">{reportCustomStart} → {reportCustomEnd}</p>
                                        </div>
                                    )}

                                    <button
                                        onClick={generatePDF}
                                        className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition duration-200"
                                    >
                                        <Download className="w-5 h-5" />
                                        Generate PDF Report
                                    </button>
                                    <p className="text-xs text-gray-400 text-center mt-2">Opens print dialog — save as PDF from there</p>
                                </div>

                                {/* ── SP Invoice Generator ── */}
                                <div className="bg-white rounded-xl shadow-sm p-6">
                                    <div className="flex items-center gap-3 mb-6">
                                        <div className="bg-green-100 rounded-lg p-2">
                                            <svg className="w-5 h-5 text-green-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                            </svg>
                                        </div>
                                        <h2 className="text-xl font-bold text-gray-900">Generate SP Invoice</h2>
                                    </div>

                                    {/* Billed To */}
                                    <div className="mb-5 border border-gray-200 rounded-lg p-4 bg-gray-50">
                                        <div className="flex justify-between items-center mb-2">
                                            <p className="text-sm font-semibold text-gray-700">Billed To</p>
                                            <button
                                                onClick={() => setEditingBilledTo(!editingBilledTo)}
                                                className="text-xs text-indigo-600 hover:text-indigo-800 font-semibold"
                                            >
                                                {editingBilledTo ? 'Done' : 'Edit'}
                                            </button>
                                        </div>
                                        {editingBilledTo ? (
                                            <div className="space-y-2">
                                                <input
                                                    type="text"
                                                    value={billedToName}
                                                    onChange={e => setBilledToName(e.target.value)}
                                                    placeholder="Organization Name"
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500"
                                                />
                                                <input
                                                    type="text"
                                                    value={billedToAddress}
                                                    onChange={e => setBilledToAddress(e.target.value)}
                                                    placeholder="Address"
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500"
                                                />
                                            </div>
                                        ) : (
                                            <div>
                                                <p className="text-sm font-semibold text-gray-800">{billedToName}</p>
                                                <p className="text-xs text-gray-500">{billedToAddress}</p>
                                            </div>
                                        )}
                                    </div>

                                    {/* SP Selector */}
                                    <div className="mb-4">
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">Select SP</label>
                                        <select
                                            value={invoiceSP}
                                            onChange={e => { setInvoiceSP(e.target.value); setInvoiceEvent(''); }}
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 text-sm"
                                        >
                                            <option value="">Choose an SP...</option>
                                            {Object.values(personnel).filter(p => p.role !== 'admin').map(p => (
                                                <option key={p.id} value={p.id}>{p.name} ({p.id})</option>
                                            ))}
                                        </select>
                                    </div>

                                    {/* Event Selector — filtered to events this SP has sessions in */}
                                    <div className="mb-5">
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">Select Event</label>
                                        <select
                                            value={invoiceEvent}
                                            onChange={e => setInvoiceEvent(e.target.value)}
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 text-sm"
                                            disabled={!invoiceSP}
                                        >
                                            <option value="">Choose an event...</option>
                                            {invoiceSP && [...new Set(
                                                sessions
                                                    .filter(s => s.personnelId === invoiceSP && s.signOutTime)
                                                    .map(s => s.eventCode)
                                            )].map(code => (
                                                <option key={code} value={code}>{events[code]?.name || code} ({code})</option>
                                            ))}
                                        </select>
                                        {invoiceSP && sessions.filter(s => s.personnelId === invoiceSP && s.signOutTime).length === 0 && (
                                            <p className="text-xs text-amber-600 mt-1">This SP has no completed sessions yet.</p>
                                        )}
                                    </div>

                                    {/* Preview summary */}
                                    {invoiceSP && invoiceEvent && (() => {
                                        const spSessions = sessions.filter(s => s.personnelId === invoiceSP && s.eventCode === invoiceEvent && s.signOutTime);
                                        const totalMins = spSessions.reduce((acc, s) => acc + (new Date(s.signOutTime) - new Date(s.signInTime)) / 60000, 0);
                                        const totalPay = ((totalMins / 60) * 25).toFixed(2);
                                        return (
                                            <div className="mb-5 p-4 bg-green-50 border border-green-200 rounded-lg">
                                                <div className="flex justify-between items-center">
                                                    <div>
                                                        <p className="text-xs text-green-700 font-semibold">Invoice Preview</p>
                                                        <p className="text-sm text-green-900 font-bold">#{invoiceEvent} — {personnel[invoiceSP]?.name}</p>
                                                        <p className="text-xs text-green-700">{spSessions.length} session{spSessions.length !== 1 ? 's' : ''} • {(totalMins/60).toFixed(2)} hrs</p>
                                                    </div>
                                                    <p className="text-2xl font-black text-green-700">${totalPay}</p>
                                                </div>
                                            </div>
                                        );
                                    })()}

                                    <button
                                        onClick={generateInvoice}
                                        disabled={!invoiceSP || !invoiceEvent}
                                        className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-green-600 hover:bg-green-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-semibold rounded-lg transition duration-200"
                                    >
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                                        </svg>
                                        Generate Invoice PDF
                                    </button>
                                    <p className="text-xs text-gray-400 text-center mt-2">Opens print dialog — save as PDF from there</p>
                                </div>

                                <div className="bg-white rounded-xl shadow-sm p-6">
                                    <h2 className="text-xl font-bold text-gray-900 mb-4">Personnel Daily Totals</h2>
                                    <div className="space-y-3">
                                        {Object.values(personnel).filter(p => p.role !== 'admin').map(person => {
                                            const todayTotal = calculateTodayTotal(person.id);
                                            const todaySessions = getTodaysSessions(person.id);
                                            const todayMinutes = calculateTotalMinutes(todaySessions);
                                            const todayFormatted = formatTimeWithPay(todayMinutes);
                                            
                                            return (
                                                <div key={person.id} className="border border-gray-200 rounded-lg p-4">
                                                    <div className="flex justify-between items-center">
                                                        <div>
                                                            <p className="font-semibold text-gray-900">{person.name}</p>
                                                            <p className="text-sm text-gray-500">ID: {person.id}</p>
                                                        </div>
                                                        <div className="text-right">
                                                            <p className="text-2xl font-bold text-green-600">${todayFormatted.pay}</p>
                                                            <p className="text-sm text-gray-500">
                                                                {todayTotal} • {todaySessions.length} sessions today
                                                            </p>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {Object.values(personnel).filter(p => p.role !== 'admin').length === 0 && (
                                            <p className="text-center text-gray-500 py-8">No personnel added yet</p>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AttendanceTracker />);
    </script>
</body>
</html>
